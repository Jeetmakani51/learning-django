{% load static %}

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" type="text/css" href="{% static 'style.css' %}" />
    <title>contact</title>
  </head>
  <body>
    {% include 'menus.html' %}
    <h1>contact page</h1>
    <div class="contact-form">
      <form method="post" action="/contactprocess">
        {% csrf_token %} subject1 :
        <input
          type="number"
          min="1"
          max="100"
          name="txt1"
          required
          autocomplete="off"
        />
        <br />
        subject2 :
        <input
          type="number"
          min="1"
          max="100"
          name="txt2"
          required
          autocomplete="off"
        />
        <br />
        <input type="submit" />
      </form>
    </div>
  </body>
</html>
